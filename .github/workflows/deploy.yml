name: Deploy

on:
  workflow_call:
    inputs:
      deploy_path:
        description: "Remote path to docker-compose.yml directory"
        type: string
        required: true
      runner_labels:
        description: "Runner labels (JSON array)"
        type: string
        default: '["self-hosted", "linux", "x64", "liwei"]'
      compose_file:
        description: "Compose file name"
        type: string
        default: "docker-compose.yml"
      environment:
        description: "GitHub deployment environment name"
        type: string
        default: "production"
    secrets:
      DEPLOY_SSH_KEY:
        required: true
      DEPLOY_HOST:
        required: true
      DEPLOY_USER:
        required: true

jobs:
  deploy:
    name: Deploy
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    environment: ${{ inputs.environment }}
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:latest"
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            echo '${{ secrets.GITHUB_TOKEN }}' | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cd ${{ inputs.deploy_path }}
            IMAGE=${IMAGE} docker compose -f ${{ inputs.compose_file }} pull
            IMAGE=${IMAGE} docker compose -f ${{ inputs.compose_file }} up -d --remove-orphans
            docker image prune -f
            echo 'Deployed: ${IMAGE}'
          "

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
