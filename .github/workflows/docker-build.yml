name: Docker Build & Push

on:
  workflow_call:
    inputs:
      dockerfile:
        description: "Path to Dockerfile"
        type: string
        default: "Dockerfile"
      context:
        description: "Docker build context"
        type: string
        default: "."
      image_name:
        description: "Override image name (default: ghcr.io/<owner>/<repo>)"
        type: string
        default: ""
      runner_labels:
        description: "Runner labels (JSON array)"
        type: string
        default: '["self-hosted", "linux", "x64", "liwei"]'
      build_args:
        description: "Docker build args (multiline KEY=VALUE)"
        type: string
        default: ""
    outputs:
      image:
        description: "Full image reference pushed"
        value: ${{ jobs.build.outputs.image }}
      digest:
        description: "Image digest"
        value: ${{ jobs.build.outputs.digest }}

jobs:
  build:
    name: Build & Push
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: image-name
        run: |
          NAME="${{ inputs.image_name }}"
          REPO="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=${NAME:-ghcr.io/${REPO}}" >> "$GITHUB_OUTPUT"

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ steps.image-name.outputs.image }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        id: push
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build_args }}
          cache-from: type=registry,ref=${{ steps.image-name.outputs.image }}:buildcache
          cache-to:   type=registry,ref=${{ steps.image-name.outputs.image }}:buildcache,mode=max
